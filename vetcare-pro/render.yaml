# Blueprint Render — API NestJS + Postgres
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vetcare-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 8h
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: vetcare-db
          property: connectionString

databases:
  - name: vetcare-db
    plan: free
    databaseName: vetcare
    user: vetcare
