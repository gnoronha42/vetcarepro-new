# Para a VPS futura: API + Postgres + Web atrás de um proxy reverso (ex.: Caddy/Nginx)
version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vetcare_secret}
      POSTGRES_DB: vetcare
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetcare"]
      interval: 5s
      retries: 10

  api:
    build: ./apps/api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://vetcare:${DB_PASSWORD:-vetcare_secret}@db:5432/vetcare
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  pgdata:
